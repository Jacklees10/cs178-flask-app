<!DOCTYPE html>
<html lang="en">
<head>
    <title>Home Page</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- display a flash message here, if necessary -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <div class="container">
        <h1 class="mt-5">The World!</h1>
        <div class="mt-3">
            <!-- Add Country Button -->
            <a href="/add-country" class="btn btn-primary">Add Country</a>
            <!-- Delete Country Button -->
            <a href="/delete-country" class="btn btn-danger">Delete Country</a>
            <!-- Update Country Button -->
            <a href="/update-country" class="btn btn-secondary">Update Country</a>
            <!-- Display All Countries Button -->
            <a href="/display-countries" class="btn btn-info">Display All Countries</a>
            <!-- Display All Countries with Capitals Button -->
            <a href="/countries-with-capitals" class="btn btn-warning">Countries & Capitals</a>
            <!-- Favorites Button -->
            <a href="/favorites" class="btn btn-warning">View Favorites</a>
        </div>
    </div>
</body>
</html>
