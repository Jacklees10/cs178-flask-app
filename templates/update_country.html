<!doctype html>
<html lang="en">
  <head>
    <title>Update Country</title>
  </head>
  <body>
    <h1>Update Country</h1>
    <form action="{{ url_for('update_country') }}" method="post">
      <label for="name">Country Name to Update:</label><br />
      <input type="text" id="name" name="name" required /><br />
      <label for="population">New Population:</label><br />
      <input type="number" id="population" name="population" required /><br />
      <label for="lifeexpectancy">New Life Expectancy:</label><br />
      <input type="text" id="lifeexpectancy" name="lifeexpectancy" /><br />
      <input type="submit" value="Update" />
    </form>
  </body>
</html>
